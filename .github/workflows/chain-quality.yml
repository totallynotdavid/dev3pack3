name: chain quality

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/chain/**'
      - '.github/workflows/chain-quality.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/chain/**'
      - '.github/workflows/chain-quality.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: check rust format
        working-directory: apps/chain
        run: cargo fmt --all --check
