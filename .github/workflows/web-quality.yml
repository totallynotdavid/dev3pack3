name: web quality

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/web/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - ".oxlintrc.json"
      - ".oxfmtrc.json"
      - ".github/workflows/web-quality.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "apps/web/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - ".oxlintrc.json"
      - ".oxfmtrc.json"
      - ".github/workflows/web-quality.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: format, lint, typecheck, build
    runs-on: ubuntu-latest

    environment:
      name: build

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: format check
        run: bun run format:check

      - name: lint
        run: bun run lint

      - name: typecheck
        run: bun run typecheck

      - name: build
        run: bun run build
        env:
          NEXT_PUBLIC_STOREFRONT_URL: ${{ secrets.NEXT_PUBLIC_STOREFRONT_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          NEXT_PUBLIC_AGENT_API_URL: ${{ secrets.NEXT_PUBLIC_AGENT_API_URL }}
          NEXT_PUBLIC_SOLANA_CLUSTER: ${{ secrets.NEXT_PUBLIC_SOLANA_CLUSTER }}
