substitutions:
  _REGION: us-central1
  _SERVICE_NAME: factor-bridge-agent
  _REPO: us-central1-docker.pkg.dev/adk-devops-agent/docker/factor-bridge-agent

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag=$_REPO:$SHORT_SHA
      - --tag=$_REPO:latest
      - --cache-from=$_REPO:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-sha
    waitFor: [build]
    args:
      - push
      - $_REPO:$SHORT_SHA

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    waitFor: [build]
    args:
      - push
      - $_REPO:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push-sha]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_REPO:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-secrets=OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest
      - --set-secrets=HUGGINGFACE_API_KEY=HUGGINGFACE_API_KEY:latest
      - --set-secrets=POSTGRES_URL=POSTGRES_URL:latest
      - --set-env-vars=MODEL_PROVIDER=huggingface
      - --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: smoke-test
    waitFor: [deploy]
    entrypoint: bash
    args:
      - -c
      - |
        SERVICE_URL=$$(gcloud run services describe $_SERVICE_NAME \
          --region=$_REGION \
          --format='value(status.url)')

        STATUS=$$(curl --silent --output /dev/null \
          --write-out "%{http_code}" \
          "$$SERVICE_URL/health")

        if [ "$$STATUS" != "200" ]; then
          echo "smoke test failed — HTTP $$STATUS"
          exit 1
        fi

        echo "smoke test passed — $$SERVICE_URL"

images:
  - $_REPO:$SHORT_SHA
  - $_REPO:latest
